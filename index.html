<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Bulk Checker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>SEO Bulk Checker</h1>
            <p>Bulk Domain Rating Checker powered by Ahrefs</p>
        </div>

        <div class="card">

            <label for="domains">
                Daftar Domain / URL
            </label>

            <textarea
                id="domains"
                placeholder="google.com&#10;facebook.com&#10;s2vm.com.au"></textarea>

            <div class="action">

                <button id="checkBtn">
                    Check Metrics
                </button>

                <span id="progressText">
                    Ready.
                </span>

            </div>

            <div class="progress">

                <div
                    id="progressBar"
                    class="progress-bar">
                </div>

            </div>

        </div>

        <div class="card">

            <div class="table-header">

                <h2>Hasil Bulk Check</h2>

                <span id="totalResult">
                    Total: 0
                </span>

            </div>

            <table>

                <thead>

                    <tr>
                        <th>Domain</th>
                        <th>DR</th>
                        <th>DA</th>
                        <th>PA</th>
                        <th>SS</th>
                        <th>Traffic</th>
                        <th>Status</th>
                    </tr>

                </thead>

                <tbody id="resultBody">

                </tbody>

            </table>

            <div class="footer">

                Domain Rating by
                <a
                    href="https://ahrefs.com"
                    target="_blank">
                    Ahrefs
                </a>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
